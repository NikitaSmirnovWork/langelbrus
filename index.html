<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Learner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #181921;
    --surface2: #1f2130;
    --surface3: #262840;
    --border: #2e3148;
    --accent: #6c8bff;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --danger: #f87171;
    --warning: #fbbf24;
    --text: #e8eaf6;
    --text2: #9ca3c8;
    --text3: #5a6080;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 15px;
  }

  .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.25s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg); z-index: 10;
  }
  .header-back {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface2); border: none;
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .header-back:active { background: var(--surface3); }
  .header-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }

  .hero { padding: 28px 20px 20px; background: linear-gradient(145deg, #161828 0%, #1a1d2e 100%); }
  .hero-label { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .hero-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 700; line-height: 1.15; }
  .hero-title em { font-style: italic; color: var(--accent2); }
  .hero-stats { display: flex; gap: 20px; margin-top: 16px; }
  .stat { display: flex; flex-direction: column; }
  .stat-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .list-container { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }

  .list-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .list-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent); border-radius: 3px 0 0 3px;
  }
  .list-item:active { background: var(--surface2); transform: scale(0.99); }

  .item-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .icon-module { background: linear-gradient(135deg, #1e2a5e, #2a3580); }
  .icon-topic  { background: linear-gradient(135deg, #1e3a2e, #1f5040); }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 15px; }
  .item-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .item-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }

  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .item-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .btn-edit   { background: rgba(108,139,255,0.15); color: var(--accent); }
  .btn-delete { background: rgba(248,113,113,0.12); color: var(--danger); }
  .btn-edit:active   { background: rgba(108,139,255,0.3); }
  .btn-delete:active { background: rgba(248,113,113,0.25); }

  .word-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .word-card-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .word-text { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; flex: 1; }
  .word-pos { display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; flex-shrink: 0; }
  .pos-noun        { background: rgba(108,139,255,0.2); color: #8faeff; }
  .pos-verb        { background: rgba(52,211,153,0.2);  color: #34d399; }
  .pos-adjective   { background: rgba(167,139,250,0.2); color: #a78bfa; }
  .pos-adverb      { background: rgba(251,191,36,0.2);  color: #fbbf24; }
  .pos-preposition { background: rgba(248,113,113,0.2); color: #f87171; }
  .pos-pronoun     { background: rgba(236,72,153,0.2);  color: #f472b6; }
  .pos-conjunction { background: rgba(20,184,166,0.2);  color: #2dd4bf; }
  .pos-interjection{ background: rgba(249,115,22,0.2);  color: #fb923c; }
  .pos-article     { background: rgba(156,163,175,0.2); color: #9ca3af; }
  .pos-other       { background: rgba(100,116,139,0.2); color: #94a3b8; }

  .word-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .word-section:last-child { border-bottom: none; }
  .word-section-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 6px; }
  .word-section-text { font-size: 14px; color: var(--text2); line-height: 1.5; }
  .word-card-actions { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface2); }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; gap: 12px; }
  .empty-icon  { font-size: 52px; opacity: 0.4; }
  .empty-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--text2); }
  .empty-sub   { font-size: 13px; color: var(--text3); max-width: 240px; line-height: 1.5; }

  /* loading skeleton */
  .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 14px; }
  .skel-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--surface3); animation: shimmer 1.4s infinite; }
  .skel-body { flex:1; display:flex; flex-direction:column; gap:8px; }
  .skel-line { height: 12px; border-radius: 6px; background: var(--surface3); animation: shimmer 1.4s infinite; }
  .skel-line.short { width: 40%; }
  @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 56px; height: 56px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-size: 26px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(108,139,255,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 20;
  }
  .fab:active { transform: scale(0.93); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); padding-bottom: env(safe-area-inset-bottom, 20px); }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .form-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.15s; width: 100%; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  textarea.form-input { resize: none; min-height: 72px; line-height: 1.5; }

  .textarea-wrap { position: relative; }
  .textarea-wrap .form-input { padding-right: 46px; }
  .ai-btn { position: absolute; right: 10px; top: 14px; width: 30px; height: 30px; border-radius: 8px; background: rgba(108,139,255,0.15); border: none; color: var(--accent); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .ai-btn:active { background: rgba(108,139,255,0.3); }
  .ai-btn.loading { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .pos-chip { padding: 9px 6px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; text-transform: capitalize; }
  .pos-chip.selected { border-color: var(--accent); background: rgba(108,139,255,0.15); color: var(--accent); }

  .btn { padding: 14px 20px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(108,139,255,0.3); }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--danger); border: 1.5px solid rgba(248,113,113,0.2); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; z-index: 200; white-space: nowrap; box-shadow: var(--shadow); animation: toastIn 0.2s ease; pointer-events: none; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.hidden { display: none; }
  .confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; text-align: center; animation: fadeIn 0.2s ease; }
  .confirm-icon { font-size: 36px; margin-bottom: 12px; }
  .confirm-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .confirm-text  { font-size: 13px; color: var(--text3); margin-bottom: 20px; line-height: 1.5; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- SCREEN: MODULES -->
<div id="screen-modules" class="screen active">
  <div class="hero">
    <div class="hero-label">Word Learner</div>
    <div class="hero-title">Your <em>vocabulary</em> journey</div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num" id="stat-modules">—</div><div class="stat-label">Modules</div></div>
      <div class="stat"><div class="stat-num" id="stat-words">—</div><div class="stat-label">Words</div></div>
    </div>
  </div>
  <div class="list-container" id="modules-list"></div>
  <button class="fab" onclick="openAddModule()">+</button>
</div>

<!-- SCREEN: TOPICS -->
<div id="screen-topics" class="screen">
  <div class="header">
    <button class="header-back" onclick="goBack('screen-modules')">←</button>
    <div><div class="header-title" id="topic-module-name"></div><div class="header-subtitle">Module</div></div>
  </div>
  <div class="list-container" id="topics-list"></div>
  <button class="fab" onclick="openAddTopic()">+</button>
</div>

<!-- SCREEN: WORDS -->
<div id="screen-words" class="screen">
  <div class="header">
    <button class="header-back" onclick="goBack('screen-topics')">←</button>
    <div><div class="header-title" id="word-topic-name"></div><div class="header-subtitle">Topic</div></div>
  </div>
  <div class="list-container" id="words-list"></div>
  <button class="fab" onclick="openAddWord(null)">+</button>
</div>

<!-- MODAL: MODULE -->
<div class="modal-overlay hidden" id="modal-module">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title" id="modal-module-title">New Module</div></div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Module Name</div>
        <input class="form-input" id="input-module-name" placeholder="e.g. Business English" maxlength="60">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal('modal-module')">Cancel</button>
        <button class="btn btn-primary" id="btn-save-module" onclick="saveModule()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: TOPIC -->
<div class="modal-overlay hidden" id="modal-topic">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title" id="modal-topic-title">New Topic</div></div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Topic Name</div>
        <input class="form-input" id="input-topic-name" placeholder="e.g. Food & Drinks" maxlength="60">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal('modal-topic')">Cancel</button>
        <button class="btn btn-primary" id="btn-save-topic" onclick="saveTopic()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: WORD -->
<div class="modal-overlay hidden" id="modal-word">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title" id="modal-word-title">New Word</div></div>
    <div class="modal-body">
      <div class="form-group">
        <div class="form-label">Word</div>
        <input class="form-input" id="input-word" placeholder="e.g. Apple" maxlength="80">
      </div>
      <div class="form-group">
        <div class="form-label">Part of Speech</div>
        <div class="pos-grid" id="pos-grid">
          <div class="pos-chip" data-pos="noun"         onclick="selectPos(this)">Noun</div>
          <div class="pos-chip" data-pos="verb"         onclick="selectPos(this)">Verb</div>
          <div class="pos-chip" data-pos="adjective"    onclick="selectPos(this)">Adjective</div>
          <div class="pos-chip" data-pos="adverb"       onclick="selectPos(this)">Adverb</div>
          <div class="pos-chip" data-pos="preposition"  onclick="selectPos(this)">Preposition</div>
          <div class="pos-chip" data-pos="pronoun"      onclick="selectPos(this)">Pronoun</div>
          <div class="pos-chip" data-pos="conjunction"  onclick="selectPos(this)">Conjunction</div>
          <div class="pos-chip" data-pos="interjection" onclick="selectPos(this)">Interjection</div>
          <div class="pos-chip" data-pos="article"      onclick="selectPos(this)">Article</div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">Description</div>
        <div class="textarea-wrap">
          <textarea class="form-input" id="input-desc" placeholder="What does this word mean?" rows="3"></textarea>
          <button class="ai-btn" id="ai-desc-btn" onclick="aiGenerate('desc')" title="Generate with AI">✏️</button>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">Example Sentence</div>
        <div class="textarea-wrap">
          <textarea class="form-input" id="input-example" placeholder="Use it in a sentence..." rows="2"></textarea>
          <button class="ai-btn" id="ai-example-btn" onclick="aiGenerate('example')" title="Generate with AI">✏️</button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal('modal-word')">Cancel</button>
        <button class="btn btn-primary" id="btn-save-word" onclick="saveWord()">Add Word</button>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete?</div>
    <div class="confirm-text" id="confirm-text">This action cannot be undone.</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const DEEPSEEK_KEY = "sk-b35fc415dc2247b38f58366844692dc6"; // ← replace

// API_BASE: same origin (Go serves both HTML and /api)
const API_BASE = window.location.origin;

// ══════════════════════════════════════════
//  TELEGRAM INIT
// ══════════════════════════════════════════
let tg = null;
let initData = "";
let tgUserId = "dev_user";

if (window.Telegram && window.Telegram.WebApp) {
  tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  initData = tg.initData || "";
  if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    tgUserId = String(tg.initDataUnsafe.user.id);
  }
}

// ══════════════════════════════════════════
//  API CLIENT
// ══════════════════════════════════════════
async function api(method, path, body) {
  const headers = { "Content-Type": "application/json" };
  if (initData) {
    headers["X-Telegram-Init-Data"] = initData;
  } else {
    headers["X-User-ID"] = tgUserId;
  }

  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

const GET    = (path)       => api("GET",    path);
const POST   = (path, body) => api("POST",   path, body);
const PUT    = (path, body) => api("PUT",    path, body);
const DELETE = (path)       => api("DELETE", path);

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let modules         = [];
let currentModuleId = null;
let currentTopicId  = null;
let editingModuleId = null;
let editingTopicId  = null;
let editingWordId   = null;
let selectedPos     = null;

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack(to) { showScreen(to); }

// ══════════════════════════════════════════
//  SKELETONS
// ══════════════════════════════════════════
function skeletons(n = 3) {
  return Array.from({length: n}, () => `
    <div class="skeleton">
      <div class="skel-icon"></div>
      <div class="skel-body">
        <div class="skel-line"></div>
        <div class="skel-line short"></div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════
//  RENDER MODULES
// ══════════════════════════════════════════
async function renderModules() {
  const el = document.getElementById('modules-list');
  el.innerHTML = skeletons();

  try {
    modules = await GET('/api/modules');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection error</div><div class="empty-sub">${esc(e.message)}</div></div>`;
    return;
  }

  document.getElementById('stat-modules').textContent = modules.length;

  // Fetch total word count across all modules
  let totalWords = 0;
  for (const m of modules) {
    try {
      const topics = await GET(`/api/modules/${m.id}/topics`);
      m._topicCount = topics.length;
      for (const t of topics) {
        const words = await GET(`/api/topics/${t.id}/words`);
        totalWords += words.length;
      }
    } catch(e) { m._topicCount = 0; }
  }
  document.getElementById('stat-words').textContent = totalWords;

  if (!modules.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📦</div>
      <div class="empty-title">No modules yet</div>
      <div class="empty-sub">Tap + to create your first learning module</div>
    </div>`;
    return;
  }

  el.innerHTML = modules.map(m => `
    <div class="list-item" onclick="openModule('${m.id}', '${esc(m.name)}')">
      <div class="item-icon icon-module">📦</div>
      <div class="item-body">
        <div class="item-name">${esc(m.name)}</div>
        <div class="item-meta">${m._topicCount ?? 0} topic${m._topicCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="item-btn btn-edit"   onclick="openEditModule('${m.id}', '${esc(m.name)}')">✏️</button>
        <button class="item-btn btn-delete" onclick="confirmDelete('Delete module &ldquo;${esc(m.name)}&rdquo;?', ()=>deleteModule('${m.id}'))">🗑️</button>
      </div>
      <div class="item-arrow">›</div>
    </div>`).join('');
}

async function openModule(id, name) {
  currentModuleId = id;
  document.getElementById('topic-module-name').textContent = name;
  showScreen('screen-topics');
  await renderTopics();
}

// ══════════════════════════════════════════
//  RENDER TOPICS
// ══════════════════════════════════════════
let cachedTopics = [];

async function renderTopics() {
  const el = document.getElementById('topics-list');
  el.innerHTML = skeletons();

  try {
    cachedTopics = await GET(`/api/modules/${currentModuleId}/topics`);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${esc(e.message)}</div></div>`;
    return;
  }

  if (!cachedTopics.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-title">No topics yet</div>
      <div class="empty-sub">Tap + to add a topic to this module</div>
    </div>`;
    return;
  }

  // Get word counts
  for (const t of cachedTopics) {
    try {
      const words = await GET(`/api/topics/${t.id}/words`);
      t._wordCount = words.length;
    } catch(e) { t._wordCount = 0; }
  }

  el.innerHTML = cachedTopics.map(t => `
    <div class="list-item" onclick="openTopic('${t.id}', '${esc(t.name)}')">
      <div class="item-icon icon-topic">📂</div>
      <div class="item-body">
        <div class="item-name">${esc(t.name)}</div>
        <div class="item-meta">${t._wordCount} word${t._wordCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="item-btn btn-edit"   onclick="openEditTopic('${t.id}', '${esc(t.name)}')">✏️</button>
        <button class="item-btn btn-delete" onclick="confirmDelete('Delete topic &ldquo;${esc(t.name)}&rdquo;?', ()=>deleteTopic('${t.id}'))">🗑️</button>
      </div>
      <div class="item-arrow">›</div>
    </div>`).join('');
}

async function openTopic(id, name) {
  currentTopicId = id;
  document.getElementById('word-topic-name').textContent = name;
  showScreen('screen-words');
  await renderWords();
}

// ══════════════════════════════════════════
//  RENDER WORDS
// ══════════════════════════════════════════
async function renderWords() {
  const el = document.getElementById('words-list');
  el.innerHTML = skeletons(2);

  let words;
  try {
    words = await GET(`/api/topics/${currentTopicId}/words`);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${esc(e.message)}</div></div>`;
    return;
  }

  if (!words.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📝</div>
      <div class="empty-title">No words yet</div>
      <div class="empty-sub">Tap + to add your first word</div>
    </div>`;
    return;
  }

  el.innerHTML = words.map(w => `
    <div class="word-card">
      <div class="word-card-header">
        <div class="word-text">${esc(w.word)}</div>
        <span class="word-pos pos-${w.pos || 'other'}">${w.pos || 'other'}</span>
      </div>
      ${w.description ? `<div class="word-section"><div class="word-section-label">Description</div><div class="word-section-text">${esc(w.description)}</div></div>` : ''}
      ${w.example     ? `<div class="word-section"><div class="word-section-label">Example</div><div class="word-section-text" style="font-style:italic;color:var(--text)">${esc(w.example)}</div></div>` : ''}
      <div class="word-card-actions">
        <button class="btn btn-secondary" style="flex:1;padding:10px" onclick='openAddWord(${JSON.stringify(w)})'>✏️ Edit</button>
        <button class="btn btn-danger"    style="flex:1;padding:10px" onclick="confirmDelete('Delete &ldquo;${esc(w.word)}&rdquo;?', ()=>deleteWord('${w.id}'))">🗑️ Delete</button>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════
//  MODULE CRUD
// ══════════════════════════════════════════
function openAddModule() {
  editingModuleId = null;
  document.getElementById('modal-module-title').textContent = 'New Module';
  document.getElementById('input-module-name').value = '';
  openModal('modal-module');
  setTimeout(() => document.getElementById('input-module-name').focus(), 300);
}
function openEditModule(id, name) {
  editingModuleId = id;
  document.getElementById('modal-module-title').textContent = 'Edit Module';
  document.getElementById('input-module-name').value = name;
  openModal('modal-module');
  setTimeout(() => document.getElementById('input-module-name').focus(), 300);
}
async function saveModule() {
  const name = document.getElementById('input-module-name').value.trim();
  if (!name) { showToast('Please enter a module name'); return; }
  const btn = document.getElementById('btn-save-module');
  btn.disabled = true; btn.textContent = '...';
  try {
    if (editingModuleId) {
      await PUT(`/api/modules/${editingModuleId}`, { name });
      showToast('Module updated ✓');
    } else {
      await POST('/api/modules', { name });
      showToast('Module created ✓');
    }
    closeModal('modal-module');
    await renderModules();
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save'; }
}
async function deleteModule(id) {
  try {
    await DELETE(`/api/modules/${id}`);
    showToast('Module deleted');
    await renderModules();
  } catch(e) { showToast('Error: ' + e.message); }
}

// ══════════════════════════════════════════
//  WORD CRUD
// ══════════════════════════════════════════
function openAddWord(wordObj) {
  editingWordId = null;
  selectedPos = null;
  document.querySelectorAll('.pos-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('modal-word-title').textContent = 'New Word';
  document.getElementById('btn-save-word').textContent = 'Add Word';
  document.getElementById('input-word').value    = '';
  document.getElementById('input-desc').value    = '';
  document.getElementById('input-example').value = '';

  if (wordObj && typeof wordObj === 'object') {
    editingWordId = wordObj.id;
    document.getElementById('modal-word-title').textContent = 'Edit Word';
    document.getElementById('btn-save-word').textContent    = 'Save';
    document.getElementById('input-word').value    = wordObj.word    || '';
    document.getElementById('input-desc').value    = wordObj.description || '';
    document.getElementById('input-example').value = wordObj.example || '';
    selectedPos = wordObj.pos || null;
    const chip = document.querySelector(`.pos-chip[data-pos="${wordObj.pos}"]`);
    if (chip) chip.classList.add('selected');
  }
  openModal('modal-word');
  setTimeout(() => document.getElementById('input-word').focus(), 300);
}
function selectPos(el) {
  document.querySelectorAll('.pos-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedPos = el.dataset.pos;
}
async function saveWord() {
  const word        = document.getElementById('input-word').value.trim();
  const description = document.getElementById('input-desc').value.trim();
  const example     = document.getElementById('input-example').value.trim();
  if (!word) { showToast('Please enter a word'); return; }

  const btn = document.getElementById('btn-save-word');
  btn.disabled = true; btn.textContent = '...';
  const body = { word, pos: selectedPos || 'other', description, example };

  try {
    if (editingWordId) {
      await PUT(`/api/topics/${currentTopicId}/words/${editingWordId}`, body);
      showToast('Word updated ✓');
    } else {
      await POST(`/api/topics/${currentTopicId}/words`, body);
      showToast(`"${word}" added ✓`);
    }
    closeModal('modal-word');
    await renderWords();
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = editingWordId ? 'Save' : 'Add Word'; }
}
async function deleteWord(id) {
  try {
    await DELETE(`/api/topics/${currentTopicId}/words/${id}`);
    showToast('Word deleted');
    await renderWords();
  } catch(e) { showToast('Error: ' + e.message); }
}

// ══════════════════════════════════════════
//  AI (DeepSeek)
// ══════════════════════════════════════════
async function aiGenerate(type) {
  const word = document.getElementById('input-word').value.trim();
  if (!word) { showToast('Enter a word first'); return; }
  const pos  = selectedPos || '';

  const btn = document.getElementById(type === 'desc' ? 'ai-desc-btn' : 'ai-example-btn');
  btn.textContent = '⏳'; btn.style.pointerEvents = 'none';

  const prompt = type === 'desc'
    ? `Give a concise dictionary-style definition of the English ${pos ? pos + ' ' : ''}word "${word}". Only the definition sentence, no quotes.`
    : `Write one simple example sentence using "${word}" as a ${pos || 'word'}. Only the sentence, no quotes.`;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_KEY}` },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], max_tokens: 120, temperature: 0.7 })
    });
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (!text) throw new Error('Empty response');
    if (type === 'desc') document.getElementById('input-desc').value    = text;
    else                 document.getElementById('input-example').value = text;
    showToast('AI filled ✨');
  } catch(e) { showToast('AI error — check your API key'); }
  finally { btn.textContent = '✏️'; btn.style.pointerEvents = ''; }
}

// ══════════════════════════════════════════
//  MODAL / CONFIRM / TOAST
// ══════════════════════════════════════════
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  const handler = e => { if (e.target === el) { closeModal(id); el.removeEventListener('click', handler); } };
  el.addEventListener('click', handler);
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function confirmDelete(text, cb) {
  document.getElementById('confirm-text').innerHTML = text;
  document.getElementById('confirm-ok-btn').onclick = () => { closeConfirm(); cb(); };
  document.getElementById('confirm-overlay').classList.remove('hidden');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.add('hidden'); }

let toastTimeout;
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.remove(), 2400);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════
document.getElementById('input-module-name').addEventListener('keydown', e => { if(e.key==='Enter') saveModule(); });
document.getElementById('input-topic-name').addEventListener('keydown',  e => { if(e.key==='Enter') saveTopic();  });

renderModules();
